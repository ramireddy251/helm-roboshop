apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: mongodb-ebs
provisioner: ebs.csi.aws.com
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Retain
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: roboshop
  labels:
    project: roboshop
    tier: db
    component: mongodb
spec:
  serviceName: mongodb-headless
  replicas: {{ .Values.deployment.replicas }}
  selector:
    matchLabels:
      project: roboshop
      tier: db
      component: mongodb
  template:
    metadata:
      labels:
        project: roboshop
        tier: db
        component: mongodb
    spec:
      containers:
      - name: mongodb
        image: "{{ .Values.deployment.imageName }}:{{ .Values.deployment.imageVersion }}"
        imagePullPolicy: Always
        resources:
          requests:
            cpu: {{ .Values.deployment.cpuRequest }}
            memory: {{ .Values.deployment.memoryRequest }}
          limits:
            cpu: {{ .Values.deployment.cpuLimit }}
            memory: {{ .Values.deployment.memoryLimit }}
        volumeMounts:
          - name: mongodb
            mountPath: /data/db
  #PVC        
  volumeClaimTemplates:
  - metadata:
      name: mongodb
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: mongodb-ebs
      resources:
        requests:
          storage: {{ .Values.deployment.storage }}    
     