apiVersion: v1
kind: Service
metadata:
  name: mongodb-headless
  namespace: roboshop
  labels:
    project: roboshop
    tier: db
    component: mongodb
spec:
  clusterIP: None
  selector:
    project: roboshop
    tier: db
    component: mongodb
  ports:
  - protocol: TCP
    port: 27017
    targetPort: 27017
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: roboshop
  labels:
    project: roboshop
    tier: db
    component: mongodb
spec:
  type: ClusterIP
  selector:
    project: roboshop
    tier: db
    component: mongodb
  ports:
  - protocol: TCP
    port: 27017
    targetPort: 27017